services:

  database-e2e:
    image: mariadb:11.5.2
    environment:
      MYSQL_DATABASE: api
      MYSQL_USER: api
      MYSQL_PASSWORD: apipass
      MYSQL_ROOT_PASSWORD: rootpass
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - e2e-network

  api-e2e:
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: sh -c "npx nx run api:serve"
    environment:
      DB_HOST: database-e2e
      DB_PORT: 3306
      DB_USER: api
      DB_PASSWORD: apipass
      DB_NAME: api
      JWT_SECRET: e2esecret
      REGISTER_ALLOWED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      database-e2e:
        condition: service_healthy
    networks:
      - e2e-network
    volumes:
      - .:/app

  seed-e2e:
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: sh -c "go run apps/api seed /app/apps/api/seed.yaml"
    environment:
      DB_HOST: database-e2e
      DB_PORT: 3306
      DB_USER: api
      DB_PASSWORD: apipass
      DB_NAME: api
      JWT_SECRET: e2esecret
    depends_on:
      api-e2e:
        condition: service_healthy
    networks:
      - e2e-network
    volumes:
      - .:/app

  frontend-e2e:
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: npx nx run frontend:serve
    environment:
      VITE_API_URL: http://api-e2e:80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4200"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      api-e2e:
        condition: service_healthy
    networks:
      - e2e-network
    volumes:
      - .:/app

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /app
    command: npx nx run frontend-e2e:e2e
    environment:
      BASE_URL: http://frontend-e2e:4200
      CI: "true"
    depends_on:
      frontend-e2e:
        condition: service_healthy
      seed-e2e:
        condition: service_completed_successfully
    networks:
      - e2e-network
    volumes:
      - .:/app
      - /app/node_modules
      - ./apps/frontend-e2e/playwright-report:/app/apps/frontend-e2e/playwright-report

networks:
  e2e-network:
    driver: bridge
