name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/librepm-project/librepm

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: go.work.sum

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Lint Go
        run: make -f Makefile.pipeline lint-go

      - name: Lint frontend
        run: make -f Makefile.pipeline lint-frontend

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: go.work.sum

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Test Go
        run: make -f Makefile.pipeline test-go

      - name: Test frontend
        run: make -f Makefile.pipeline test-frontend

  # ── E2E ─────────────────────────────────────────────────────────────────────
  #e2e:
  #  name: E2E Tests
  #  runs-on: ubuntu-latest
  #  needs: test
  #  steps:
  #    - uses: actions/checkout@v4
  #
  #    - uses: actions/setup-go@v5
  #      with:
  #        go-version-file: apps/api/go.mod
  #        cache-dependency-path: go.work.sum
  #
  #    - uses: actions/setup-node@v4
  #      with:
  #        node-version-file: package.json
  #        cache: npm
  #
  #    - name: Install Node dependencies
  #      run: npm ci --ignore-scripts
  #
  #    - name: Run E2E tests
  #      run: make -f Makefile.pipeline test-e2e
  #
  #    - name: Upload Playwright report
  #      if: always()
  #      uses: actions/upload-artifact@v4
  #      with:
  #        name: playwright-report
  #        path: apps/frontend-e2e/playwright-report/
  #        retention-days: 14

  # ── Build & Push ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test] #, e2e]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract version from package.json
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          PUSH_ARGS=""
          if [ "${{ github.ref }}" = "refs/heads/master" ] && [ "${{ github.event_name }}" = "push" ]; then
            PUSH_ARGS="--push"
          fi
          make -f Makefile.pipeline build \
            CACHE_ARGS="--cache-from type=gha --cache-to type=gha,mode=max" \
            PUSH_ARGS="$PUSH_ARGS"

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Export Docker image
        run: |
          docker pull ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          docker save ${{ env.IMAGE }}:${{ steps.version.outputs.version }} | gzip > librepm-v${{ steps.version.outputs.version }}.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "v${{ steps.version.outputs.version }}" 2>/dev/null && echo "Release already exists, skipping." || \
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            librepm-v${{ steps.version.outputs.version }}.tar.gz

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: vps.teletype.hu
          username: librepm
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: cd ~/librepm && make upgrade
