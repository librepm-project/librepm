services:

  traefik:
    profiles:
      - dev
    image: traefik:v2.10
    container_name: librepm_traefik
    ports:
      - "8080:8080"
      - "8081:8081"
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   
    networks:
      - nx-network

  npm_install:
    profiles:
      - install
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: npm install
    container_name: librepm_npm_install
    volumes:
      - .:/app

  go_mod_install:
    profiles:
      - install
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: ./go.mod.install.sh
    container_name: librepm_go_mod_install
    volumes:
      - .:/app

  cli:
    profiles:
      - cli
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: tail -f /dev/null
    container_name: librepm_cli
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: api
      DB_PASSWORD: apipass
      DB_NAME: api
      JWT_SECRET: secret
    networks:
      - nx-network
    volumes:
      - .:/app

  api:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: npx nx run api:serve
    container_name: librepm_api
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: api
      DB_PASSWORD: apipass
      DB_NAME: api
      OPENAPI_PATH: /app/apps/api/app/http/openapi.yaml
      JWT_SECRET: secret
      REGISTER_ALLOWED: "true"
    labels:
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.services.api.loadbalancer.server.port=80"
      - "traefik.http.middlewares.api-strip-prefix.stripPrefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip-prefix"
      - "traefik.http.routers.api.entrypoints=web"
    ports:
      - '3000:80'
    volumes:
      - .:/app
      - api-uploads:/app/apps/api/uploads
    networks:
      - nx-network
    depends_on:
      - database

  frontend:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile.development
    entrypoint: npx nx run frontend:serve
    container_name: librepm_frontend
    labels:
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=4200"
      - "traefik.http.routers.frontend.entrypoints=web"   
    ports:
      - '4200:4200'
    volumes:
      - .:/app
    networks:
      - nx-network
    depends_on:
      - api

  playwright:
    profiles:
      - e2e
    image: mcr.microsoft.com/playwright:v1.59.0-noble
    working_dir: /app/apps/frontend-e2e
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "until node -e \"const h=require('http');h.get('http://host.docker.internal:4200',r=>process.exit(0)).on('error',()=>process.exit(1))\" 2>/dev/null; do
        echo 'Waiting for frontend...'; sleep 2;
      done && npx playwright test"
    environment:
      BASE_URL: http://host.docker.internal:8081
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - .:/app

  database:
    profiles:
      - dev
    image: mariadb:11.5.2
    container_name: librepm_database
    environment:
      MYSQL_DATABASE: api
      MYSQL_USER: api
      MYSQL_PASSWORD: apipass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - 3306:3306
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - nx-network

networks:
  nx-network:
    driver: bridge

volumes:
  db-data:
  api-uploads:
