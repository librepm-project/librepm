openapi: 3.1.0
info:
  title: LibrePM API
  version: 1.0.0

security:
  - BearerAuth: []

tags:
  - name: auth
  - name: project
  - name: issue
  - name: worklog
  - name: comment
  - name: attachment
  - name: filter
  - name: board
  - name: dashboard
  - name: tracker
  - name: status
  - name: priority
  - name: transition
  - name: release
  - name: user
  - name: setting
  - name: notification
  - name: system

paths:
  /health:
    get:
      tags: [system]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK

  /config:
    get:
      tags: [system]
      summary: Get app configuration
      security: []
      responses:
        '200':
          description: App config

  /onboard:
    post:
      tags: [system]
      summary: Initial setup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardRequest'
      responses:
        '201':
          description: Created

  /ws:
    get:
      tags: [system]
      summary: WebSocket connection
      security: []
      responses:
        '101':
          description: Switching Protocols

  # Auth

  /user/session:
    post:
      tags: [auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Invalid credentials

  /user/register:
    post:
      tags: [auth]
      summary: Register user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'

  # Projects

  /project:
    get:
      tags: [project]
      summary: List projects
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [project]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /project/{projectId}:
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      tags: [project]
      summary: Get a project
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    put:
      tags: [project]
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      tags: [project]
      summary: Delete a project
      responses:
        '204':
          description: No content

  /project/{projectId}/issue-property:
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      tags: [project]
      summary: Get project issue properties
      responses:
        '200':
          description: Project issue property configuration

  /project/{projectId}/tracker:
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      tags: [project]
      summary: List trackers assigned to a project
      responses:
        '200':
          description: List of trackers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tracker'

  /project/{projectId}/status:
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      tags: [project]
      summary: List statuses assigned to a project
      responses:
        '200':
          description: List of statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Status'

  /project/{projectId}/attachment:
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      tags: [attachment]
      summary: List attachments for a project
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
    post:
      tags: [attachment]
      summary: Upload attachment to project
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'

  /project/{projectId}/release:
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      tags: [release]
      summary: List releases for a project
      responses:
        '200':
          description: List of project releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectRelease'

  # Issues

  /issue:
    get:
      tags: [issue]
      summary: List issues
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
    post:
      tags: [issue]
      summary: Create issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueRequest'
      responses:
        '201':
          description: Created issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'

  /issue/key/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
        example: PROJ-1
    get:
      tags: [issue]
      summary: Get issue by key
      responses:
        '200':
          description: Issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'

  /issue/{issueId}:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [issue]
      summary: Get an issue
      responses:
        '200':
          description: Issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
    put:
      tags: [issue]
      summary: Update an issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueRequest'
      responses:
        '200':
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
    delete:
      tags: [issue]
      summary: Delete an issue
      responses:
        '204':
          description: No content

  /issue/{issueId}/related:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [issue]
      summary: List related issues
      responses:
        '200':
          description: List of related issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RelatedIssue'
    post:
      tags: [issue]
      summary: Add related issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelatedIssueRequest'
      responses:
        '201':
          description: Created related issue link

  /related-issue/{relatedIssueId}:
    parameters:
      - name: relatedIssueId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [issue]
      summary: Remove related issue link
      responses:
        '204':
          description: No content

  /issue/{issueId}/audit-log:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [issue]
      summary: List audit log for an issue
      responses:
        '200':
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueAuditLog'

  /issue/{issueId}/project-release-issue:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [release]
      summary: Get project release issue for an issue
      responses:
        '200':
          description: Project release issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectReleaseIssue'

  # Worklogs

  /issue/{issueId}/worklog:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [worklog]
      summary: List worklogs for an issue
      responses:
        '200':
          description: List of worklogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Worklog'
    post:
      tags: [worklog]
      summary: Create worklog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorklogRequest'
      responses:
        '201':
          description: Created worklog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worklog'

  /issue/{issueId}/worklog/{worklogId}:
    parameters:
      - $ref: '#/components/parameters/issueId'
      - name: worklogId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [worklog]
      summary: Update worklog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorklogRequest'
      responses:
        '200':
          description: Updated worklog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worklog'
    delete:
      tags: [worklog]
      summary: Delete worklog
      responses:
        '204':
          description: No content

  # Attachments

  /issue/{issueId}/attachment:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [attachment]
      summary: List attachments for an issue
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
    post:
      tags: [attachment]
      summary: Upload attachment to issue
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'

  /attachment/{attachmentId}/download:
    parameters:
      - name: attachmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [attachment]
      summary: Download an attachment
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /attachment/{attachmentId}:
    parameters:
      - name: attachmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [attachment]
      summary: Delete an attachment
      responses:
        '204':
          description: No content

  # Comments

  /issue/{issueId}/comment:
    parameters:
      - $ref: '#/components/parameters/issueId'
    get:
      tags: [comment]
      summary: List comments for an issue
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
    post:
      tags: [comment]
      summary: Create comment on issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'

  /comment/{commentId}:
    parameters:
      - name: commentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [comment]
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
    delete:
      tags: [comment]
      summary: Delete a comment
      responses:
        '204':
          description: No content

  # Filters

  /filter/condition-options:
    get:
      tags: [filter]
      summary: Get available filter fields and operators
      responses:
        '200':
          description: Filter condition options

  /filter:
    get:
      tags: [filter]
      summary: List filters
      responses:
        '200':
          description: List of filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Filter'
    post:
      tags: [filter]
      summary: Create filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
      responses:
        '201':
          description: Created filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Filter'

  /filter/{filterId}:
    parameters:
      - $ref: '#/components/parameters/filterId'
    get:
      tags: [filter]
      summary: Get a filter
      responses:
        '200':
          description: Filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Filter'
    put:
      tags: [filter]
      summary: Update a filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
      responses:
        '200':
          description: Updated filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Filter'
    delete:
      tags: [filter]
      summary: Delete a filter
      responses:
        '204':
          description: No content

  # Boards

  /board:
    get:
      tags: [board]
      summary: List boards
      responses:
        '200':
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'
    post:
      tags: [board]
      summary: Create board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardRequest'
      responses:
        '201':
          description: Created board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'

  /board/{boardId}:
    parameters:
      - $ref: '#/components/parameters/boardId'
    get:
      tags: [board]
      summary: Get a board
      responses:
        '200':
          description: Board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
    put:
      tags: [board]
      summary: Update a board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardRequest'
      responses:
        '200':
          description: Updated board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
    delete:
      tags: [board]
      summary: Delete a board
      responses:
        '204':
          description: No content

  # Dashboards

  /dashboard:
    get:
      tags: [dashboard]
      summary: List dashboards
      responses:
        '200':
          description: List of dashboards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dashboard'
    post:
      tags: [dashboard]
      summary: Create dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardRequest'
      responses:
        '201':
          description: Created dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'

  /dashboard/{dashboardId}:
    parameters:
      - $ref: '#/components/parameters/dashboardId'
    get:
      tags: [dashboard]
      summary: Get a dashboard
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
    put:
      tags: [dashboard]
      summary: Update a dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardRequest'
      responses:
        '200':
          description: Updated dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
    delete:
      tags: [dashboard]
      summary: Delete a dashboard
      responses:
        '204':
          description: No content

  /dashboard/{dashboardId}/widget:
    parameters:
      - $ref: '#/components/parameters/dashboardId'
    get:
      tags: [dashboard]
      summary: List widgets for a dashboard
      responses:
        '200':
          description: List of widgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardWidget'
    post:
      tags: [dashboard]
      summary: Create widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetRequest'
      responses:
        '201':
          description: Created widget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidget'

  /dashboard/{dashboardId}/widget/reorder:
    parameters:
      - $ref: '#/components/parameters/dashboardId'
    put:
      tags: [dashboard]
      summary: Reorder widgets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                widgetIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: OK

  /dashboard/{dashboardId}/widget/{widgetId}:
    parameters:
      - $ref: '#/components/parameters/dashboardId'
      - name: widgetId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [dashboard]
      summary: Update widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWidgetUpdateRequest'
      responses:
        '200':
          description: Updated widget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardWidget'
    delete:
      tags: [dashboard]
      summary: Delete widget
      responses:
        '204':
          description: No content

  # Trackers

  /tracker:
    get:
      tags: [tracker]
      summary: List trackers
      responses:
        '200':
          description: List of trackers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tracker'
    post:
      tags: [tracker]
      summary: Create tracker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerRequest'
      responses:
        '201':
          description: Created tracker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tracker'

  /tracker/{trackerId}:
    parameters:
      - $ref: '#/components/parameters/trackerId'
    get:
      tags: [tracker]
      summary: Get a tracker
      responses:
        '200':
          description: Tracker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tracker'
    put:
      tags: [tracker]
      summary: Update a tracker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerRequest'
      responses:
        '200':
          description: Updated tracker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tracker'
    delete:
      tags: [tracker]
      summary: Delete a tracker
      responses:
        '204':
          description: No content

  # Statuses

  /status:
    get:
      tags: [status]
      summary: List statuses
      responses:
        '200':
          description: List of statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Status'
    post:
      tags: [status]
      summary: Create status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusRequest'
      responses:
        '201':
          description: Created status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'

  /status/{statusId}:
    parameters:
      - $ref: '#/components/parameters/statusId'
    get:
      tags: [status]
      summary: Get a status
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
    put:
      tags: [status]
      summary: Update a status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusRequest'
      responses:
        '200':
          description: Updated status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
    delete:
      tags: [status]
      summary: Delete a status
      responses:
        '204':
          description: No content

  # Priorities

  /priority:
    get:
      tags: [priority]
      summary: List priorities
      responses:
        '200':
          description: List of priorities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Priority'
    post:
      tags: [priority]
      summary: Create priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriorityRequest'
      responses:
        '201':
          description: Created priority
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Priority'

  /priority/{priorityId}:
    parameters:
      - $ref: '#/components/parameters/priorityId'
    get:
      tags: [priority]
      summary: Get a priority
      responses:
        '200':
          description: Priority
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Priority'
    put:
      tags: [priority]
      summary: Update a priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriorityRequest'
      responses:
        '200':
          description: Updated priority
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Priority'
    delete:
      tags: [priority]
      summary: Delete a priority
      responses:
        '204':
          description: No content

  # Transitions

  /transition:
    get:
      tags: [transition]
      summary: List transitions
      responses:
        '200':
          description: List of transitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transition'
    post:
      tags: [transition]
      summary: Create transition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '201':
          description: Created transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transition'

  /transition/{transitionId}:
    parameters:
      - $ref: '#/components/parameters/transitionId'
    get:
      tags: [transition]
