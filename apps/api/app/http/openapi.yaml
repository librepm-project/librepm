            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectReleaseIssue'

  /project-release-issue:
    get:
      tags: [release]
      summary: List project release issues
      responses:
        '200':
          description: List of project release issues
          content:
            application/json:
              schema:
                type: array
