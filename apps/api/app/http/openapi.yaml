        '201':
          description: Created release
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'

  /release/{releaseId}:
    parameters:
      - $ref: '#/components/parameters/releaseId'
    get:
      tags: [release]
      summary: Get a release
      responses:
        '200':
          description: Release
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
    put:
      tags: [release]
      summary: Update a release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseRequest'
      responses:
        '200':
          description: Updated release
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
    delete:
      tags: [release]
