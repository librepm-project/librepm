                $ref: '#/components/schemas/ProjectReleaseIssue'

  /project-release-issue/{projectReleaseIssueId}:
    parameters:
      - name: projectReleaseIssueId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [release]
      summary: Get a project release issue
      responses:
        '200':
          description: Project release issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectReleaseIssue'
    delete:
      tags: [release]
      summary: Remove issue from project release
      responses:
        '204':
          description: No content

  # Settings

  /setting:
    get:
      tags: [setting]
      summary: List all settings
      security: []
      responses:
        '200':
          description: List of settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Setting'

  /setting/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
          enum:
            - site_title
            - dark_mode
            - default_issue_display_columns
            - default_issue_display_group_by
            - default_board_id
            - default_dashboard_id
            - onboarded
    put:
      tags: [setting]
      summary: Update a setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingRequest'
      responses:
        '200':
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Setting'

  # Notifications

  /notification:
    get:
      tags: [notification]
      summary: List notifications for current user
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /notification/{notificationId}/read:
    parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [notification]
      summary: Mark notification as read
      responses:
        '200':
          description: OK

  # Users

  /user:
    get:
      tags: [user]
      summary: List users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [user]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /user/{userId}:
    parameters:
      - $ref: '#/components/parameters/userId'
    get:
      tags: [user]
      summary: Get a user
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      tags: [user]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [user]
      summary: Delete a user
      responses:
        '204':
          description: No content

  /user/current:
    get:
      tags: [user]
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      tags: [user]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [user]
      summary: Delete current user account
      responses:
        '204':
          description: No content

  /user/permission:
    get:
      tags: [user]
      summary: Get current user permissions
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsResponse'

  /user/{userId}/role:
    parameters:
      - $ref: '#/components/parameters/userId'
    get:
      tags: [user]
      summary: List roles for a user
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolesResponse'
    post:
      tags: [user]
      summary: Assign role to user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '201':
          description: Role assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'

  /user/{userId}/role/{role}:
    parameters:
      - $ref: '#/components/parameters/userId'
      - name: role
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [user]
      summary: Remove role from user
      responses:
        '204':
          description: No content

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    issueId:
      name: issueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    filterId:
      name: filterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    boardId:
      name: boardId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    dashboardId:
      name: dashboardId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    trackerId:
      name: trackerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    statusId:
      name: statusId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    priorityId:
      name: priorityId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    transitionId:
      name: transitionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    releaseId:
      name: releaseId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:

    # Auth

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        firstName:
          type: string
        lastName:
          type: string

    SessionResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    OnboardRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        firstName:
          type: string
        lastName:
          type: string

    # User

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        language:
          type: string
        country:
          type: string

    UserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        language:
          type: string
        country:
          type: string

    PermissionsResponse:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string

    RolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string

    RoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string

    RoleResponse:
      type: object
      properties:
        role:
          type: string

    # Project

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        codeName:
          type: string
        defaultStatusId:
          type: string
          format: uuid
          nullable: true
        defaultTrackerId:
          type: string
          format: uuid
          nullable: true

    ProjectRequest:
      type: object
      required: [name, codeName]
      properties:
        name:
          type: string
        codeName:
          type: string
        defaultStatusId:
          type: string
          format: uuid
          nullable: true
        defaultTrackerId:
          type: string
          format: uuid
          nullable: true

    # Issue

    Issue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          example: PROJ-1
        summary:
          type: string
        description:
          type: string
        assignedUserId:
          type: string
          format: uuid
          nullable: true
        assignedUser:
          $ref: '#/components/schemas/User'
        reporterUserId:
          type: string
          format: uuid
          nullable: true
        reporterUser:
          $ref: '#/components/schemas/User'
        priorityId:
          type: string
          format: uuid
          nullable: true
        priority:
          $ref: '#/components/schemas/Priority'
        project:
          $ref: '#/components/schemas/Project'
        status:
          $ref: '#/components/schemas/Status'
        tracker:
          $ref: '#/components/schemas/Tracker'

    IssueRequest:
      type: object
      required: [projectId, statusId, trackerId, summary]
      properties:
        projectId:
          type: string
          format: uuid
        statusId:
          type: string
          format: uuid
        trackerId:
          type: string
          format: uuid
        assignedUserId:
          type: string
          format: uuid
          nullable: true
        reporterUserId:
          type: string
          format: uuid
          nullable: true
        priorityId:
          type: string
          format: uuid
          nullable: true
        summary:
          type: string
        description:
          type: string

    RelatedIssue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        issueA:
          $ref: '#/components/schemas/Issue'
        issueB:
          $ref: '#/components/schemas/Issue'
        type:
          type: string
          enum: [related, blocks, implements, duplicates]
        directionFromCurrent:
          type: string
        createdAt:
          type: string
          format: date-time

    RelatedIssueRequest:
      type: object
      required: [targetIssueId, type]
      properties:
        targetIssueId:
          type: string
          format: uuid
        type:
          type: string
          enum: [related, blocks, implements, duplicates]

    IssueAuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum:
            - field_changed
            - attachment_added
            - attachment_removed
            - worklog_added
            - worklog_updated
            - worklog_removed
            - related_issue_added
            - related_issue_removed
        field:
          type: string
        oldValue:
          type: string
        newValue:
          type: string
        meta:
          type: string
        user:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time

    # Worklog

    Worklog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        seconds:
          type: integer
        comment:
          type: string
        loggedAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    WorklogRequest:
      type: object
      required: [seconds, loggedAt]
      properties:
        seconds:
          type: integer
        comment:
          type: string
        loggedAt:
          type: string
          format: date-time

    # Comment

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # Attachment

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
          format: int64
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    # Filter

    Filter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        public:
          type: boolean
        columnList:
          type: string
        groupBy:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/FilterCondition'

    FilterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        public:
          type: boolean
        columnList:
          type: string
        groupBy:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/FilterConditionRequest'

    FilterCondition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        field:
          type: string
        op:
          type: string
        value:
          type: string

    FilterConditionRequest:
      type: object
      required: [field, op, value]
      properties:
        field:
          type: string
        op:
          type: string
        value:
          type: string

    # Board

    Board:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        boardColumns:
          type: array
          items:
            $ref: '#/components/schemas/BoardColumn'

    BoardRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        boardColumns:
          type: array
          items:
            $ref: '#/components/schemas/BoardColumnRequest'

    BoardColumn:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        weight:
          type: integer
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/Status'

    BoardColumnRequest:
      type: object
      required: [label]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        label:
          type: string
        weight:
          type: integer
        statusIds:
          type: array
          items:
            type: string
            format: uuid

    # Dashboard

    Dashboard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        public:
          type: boolean
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardWidget'

    DashboardRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        public:
          type: boolean

    DashboardWidget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dashboardId:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        weight:
          type: integer
        width:
          type: string
        filter:
          $ref: '#/components/schemas/Filter'

    DashboardWidgetRequest:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
        title:
          type: string
        filterId:
          type: string
          format: uuid
          nullable: true

    DashboardWidgetUpdateRequest:
      type: object
      properties:
        width:
          type: string
          nullable: true

    # Tracker / Status / Priority

    Tracker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          example: '#3498db'

    TrackerRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string
          example: '#3498db'

    Status:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          example: '#2ecc71'

    StatusRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string
          example: '#2ecc71'

    Priority:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          example: '#e74c3c'

    PriorityRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string
          example: '#e74c3c'

    # Transition

    Transition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sourceStatusId:
          type: string
          format: uuid
        targetStatusId:
          type: string
          format: uuid

    TransitionRequest:
      type: object
      required: [name, sourceStatusId, targetStatusId]
      properties:
        name:
          type: string
        sourceStatusId:
          type: string
          format: uuid
        targetStatusId:
          type: string
          format: uuid

    # Release

    Release:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [Planned, Released]
        released_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReleaseRequest:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [Planned, Released]
        released_at:
          type: string
          format: date-time
          nullable: true

    ProjectRelease:
      type: object
      properties:
        id:
          type: string
          format: uuid
        release_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        release:
          $ref: '#/components/schemas/Release'
        project:
          $ref: '#/components/schemas/Project'

    ProjectReleaseRequest:
      type: object
      required: [releaseId, projectId]
      properties:
        releaseId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid

    ProjectReleaseIssue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_release_id:
          type: string
          format: uuid
        issue_id:
          type: string
          format: uuid
        issue:
          $ref: '#/components/schemas/Issue'

    ProjectReleaseIssueRequest:
      type: object
      required: [projectReleaseId, issueId]
      properties:
        projectReleaseId:
          type: string
          format: uuid
        issueId:
          type: string
          format: uuid

    # Setting

    Setting:
      type: object
      properties:
        key:
          type: string
          enum:
            - site_title
            - dark_mode
            - default_issue_display_columns
            - default_issue_display_group_by
            - default_board_id
            - default_dashboard_id
            - onboarded
        value:
          type: string
        valueType:
          type: string
          enum: [string, boolean, number, json]
        options:
          type: array
          items:
            type: string

    SettingRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string

    # Notification

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        entityType:
          type: string
          nullable: true
        entityId:
          type: string
          format: uuid
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
