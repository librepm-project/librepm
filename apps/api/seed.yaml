filters:
  - name: "Open Issues"
    description: "All issues that are not closed"
    user_email: "testuser@example.com"
    conditions:
      - field: "summary"
        op: "contains"
        value: ""
  - name: "Wedding Tasks"
    description: "Filter for wedding-related tasks"
    user_email: "testuser@example.com"
    conditions:
      - field: "summary"
        op: "contains"
        value: "wedding"

dashboard_widgets:
  - dashboard_name: "Wedding Dashboard"
    filter_name: "Wedding Tasks"
    type: "filter"
    title: "Wedding Tasks"
    weight: 1
    width: "1/2"
  - dashboard_name: "Wedding Dashboard"
    filter_name: "Open Issues"
    type: "filter"
    title: "All Open Issues"
    weight: 2
    width: "1/2"

projects:
  - name: Wedding Project
    description: Planning and organizing the full wedding event
    code_name: "WED"
    trackers:
      - name: "Planning"
        statuses: ["Planned", "Contacted", "Confirmed", "Delivered"]
      - name: "Booking"
        statuses: ["Planned", "Contacted", "Confirmed", "Delivered"]
      - name: "Vendor"
        statuses: ["Planned", "Contacted", "Confirmed", "Delivered"]
      - name: "Invitation"
        statuses: ["Planned", "Contacted", "Confirmed", "Delivered"]

  - name: Startup Launch
    description: All tasks related to starting a new tech company
    code_name: "START"
    trackers:
      - name: "Legal"
        statuses: ["Not Started", "Researching", "Pending Approval", "Launched"]
      - name: "Finance"
        statuses: ["Not Started", "Researching", "Pending Approval", "Launched"]
      - name: "Operations"
        statuses: ["Not Started", "Researching", "Pending Approval", "Launched"]
      - name: "Marketing"
        statuses: ["Not Started", "Researching", "Pending Approval", "Launched"]

  - name: Retro Gaming Party
    description: Organize a retro gaming event with classic games and consoles
    code_name: "RGP"
    trackers:
      - name: "Story"
        statuses: ["To Do", "In Progress", "Scheduled", "Done"]
      - name: "Task"
        statuses: ["To Do", "In Progress", "Scheduled", "Done"]
      - name: "Epic"
        statuses: ["To Do", "In Progress", "Scheduled", "Done"]
      - name: "Bug"
        statuses: ["To Do", "In Progress", "Needs Approval", "Done"]
      - name: "Setup"
        statuses: ["To Do", "In Progress", "Tested", "Done"]
      - name: "Logistics"
        statuses: ["To Do", "In Progress", "Scheduled", "Done"]
      - name: "Promo"
        statuses: ["To Do", "In Progress", "Needs Approval", "Done"]

  - name: Commodore 64 Restoration
    description: Restoring and refurbishing a Commodore 64 vintage computer
    code_name: "C64"
    trackers:
      - name: "Story"
        statuses: ["Open", "To Do", "In Progress", "Done"]
      - name: "Task"
        statuses: ["Open", "To Do", "In Progress", "Done"]
      - name: "Epic"
        statuses: ["Open", "To Do", "In Progress", "Done"]
      - name: "Bug"
        statuses: ["Open", "To Do", "In Progress", "Done"]

  - name: London Trip
    description: Plan and organize a sightseeing trip to London
    code_name: "LON"
    trackers:
      - name: "Booking"
        statuses: ["Idea", "Planned", "Booked", "Completed"]
      - name: "Activity"
        statuses: ["Idea", "Planned", "Booked", "Completed"]
      - name: "Checklist"
        statuses: ["Idea", "Planned", "Packed", "Completed"]

issues:
  # Wedding project issues
  - summary: Wedding Planning
    description: Coordinating all tasks needed for the entire wedding event
    project_name: Wedding Project
    tracker_name: Planning
    status_name: Confirmed

  - summary: Book Venue
    description: Find and book a suitable venue for the wedding
    project_name: Wedding Project
    tracker_name: Booking
    status_name: Contacted
    parent_name: Wedding Planning

  - summary: Choose Menu
    description: Select the dinner menu for the wedding
    project_name: Wedding Project
    tracker_name: Vendor
    status_name: Planned
    parent_name: Book Venue

  # Startup project issues
  - summary: Startup Foundation
    description: Main epic to organize all tasks for launching the startup
    project_name: Startup Launch
    tracker_name: Legal
    status_name: Pending Approval

  - summary: Register the Company
    description: Legally register the business with local authorities
    project_name: Startup Launch
    tracker_name: Legal
    status_name: Researching
    parent_name: Startup Foundation

  # Retro Gaming Party issues
  - summary: Plan Game List
    description: Compile a list of retro games for the party
    project_name: Retro Gaming Party
    tracker_name: Task
    status_name: To Do

  - summary: Set Up Consoles
    description: Set up the retro gaming consoles for the party
    project_name: Retro Gaming Party
    tracker_name: Setup
    status_name: In Progress

  - summary: Book Venue
    description: Find a venue to host the retro gaming event
    project_name: Retro Gaming Party
    tracker_name: Logistics
    status_name: Scheduled

  # Commodore 64 Restoration issues
  - summary: Disassemble C64
    description: Take apart the Commodore 64 to inspect internal components
    project_name: Commodore 64 Restoration
    tracker_name: Task
    status_name: To Do

  # London Trip issues
  - summary: Book Flights
    description: Book flight tickets to London
    project_name: London Trip
    tracker_name: Booking
    status_name: Booked

  - summary: Create Itinerary
    description: Plan the trip itinerary for sightseeing in London
    project_name: London Trip
    tracker_name: Activity
    status_name: Planned
related_issues:
  - issue_a: "Book Venue"
    issue_b: "Choose Menu"
    type: "blocks"

  - issue_a: "Register the Company"
    issue_b: "Startup Foundation"
    type: "implements"

  - issue_a: "Set Up Consoles"
    issue_b: "Plan Game List"
    type: "blocks"

  - issue_a: "Book Flights"
    issue_b: "Create Itinerary"
    type: "related"

  - issue_a: "Disassemble C64"
    issue_b: "Set Up Consoles"
    type: "related"

  - issue_a: "Wedding Planning"
    issue_b: "Book Venue"
    type: "implements"

