issues:
  # Wedding project issues
  - summary: Wedding Planning
    description: Coordinating all tasks needed for the entire wedding event
    project_name: Wedding Project
    tracker_name: Epic
    status_name: In Progress

  - summary: Book Venue
    description: Find and book a suitable venue for the wedding
    project_name: Wedding Project
    tracker_name: Story
    status_name: To Do
    parent_name: Wedding Planning

  - summary: Choose Menu
    description: Select the dinner menu for the wedding
    project_name: Wedding Project
    tracker_name: Task
    status_name: Open
    parent_name: Book Venue

  - summary: Hire Band
    description: Find a band to play at the wedding party
    project_name: Wedding Project
    tracker_name: Task
    status_name: Open
    parent_name: Book Venue

  - summary: Send Invitations
    description: Send out wedding invitations to all guests
    project_name: Wedding Project
    tracker_name: Task
    status_name: Open
    parent_name: Book Venue

  - summary: Book Photographer
    description: Hire a professional photographer for the wedding
    project_name: Wedding Project
    tracker_name: Task
    status_name: Open
    parent_name: Book Venue

  - summary: Plan Seating Chart
    description: Create a well-organized seating chart for guests
    project_name: Wedding Project
    tracker_name: Task
    status_name: Open
    parent_name: Book Venue

  # Startup project issues
  - summary: Startup Foundation
    description: Main epic to organize all tasks for launching the startup
    project_name: Startup Launch
    tracker_name: Epic
    status_name: In Progress

  - summary: Register the Company
    description: Legally register the business with local authorities
    project_name: Startup Launch
    tracker_name: Story
    status_name: To Do
    parent_name: Startup Foundation

  - summary: Open Business Bank Account
    description: Set up a dedicated bank account for the new company
    project_name: Startup Launch
    tracker_name: Task
    status_name: Open
    parent_name: Register the Company

  - summary: Get a Domain Name
    description: Purchase and configure a domain name for the company website
    project_name: Startup Launch
    tracker_name: Task
    status_name: Open
    parent_name: Register the Company

  - summary: Hire Accountant
    description: Find a professional accountant to manage finances
    project_name: Startup Launch
    tracker_name: Task
    status_name: Open
    parent_name: Register the Company

  - summary: Choose Legal Structure
    description: Decide on the appropriate legal entity (e.g., LLC, Inc.)
    project_name: Startup Launch
    tracker_name: Task
    status_name: Open
    parent_name: Register the Company

  - summary: File Tax ID
    description: Apply for a tax ID from the IRS
    project_name: Startup Launch
    tracker_name: Task
    status_name: Open
    parent_name: Register the Company

  # Retro Gaming Party issues
  - summary: Plan Game List
    description: Compile a list of retro games for the party
    project_name: Retro Gaming Party
    tracker_name: Task
    status_name: To Do

  - summary: Set Up Consoles
    description: Set up the retro gaming consoles for the party
    project_name: Retro Gaming Party
    tracker_name: Task
    status_name: To Do

  - summary: Book Venue
    description: Find a venue to host the retro gaming event
    project_name: Retro Gaming Party
    tracker_name: Task
    status_name: To Do

  # Commodore 64 Restoration issues
  - summary: Disassemble C64
    description: Take apart the Commodore 64 to inspect internal components
    project_name: Commodore 64 Restoration
    tracker_name: Task
    status_name: To Do

  - summary: Replace Capacitors
    description: Replace faulty capacitors in the Commodore 64
    project_name: Commodore 64 Restoration
    tracker_name: Task
    status_name: To Do

  - summary: Clean C64
    description: Clean the internal and external parts of the Commodore 64
    project_name: Commodore 64 Restoration
    tracker_name: Task
    status_name: To Do

  # London Trip issues
  - summary: Book Flights
    description: Book flight tickets to London
    project_name: London Trip
    tracker_name: Task
    status_name: To Do

  - summary: Find Accommodation
    description: Search for accommodation options in London
    project_name: London Trip
    tracker_name: Task
    status_name: To Do

  - summary: Create Itinerary
    description: Plan the trip itinerary for sightseeing in London
    project_name: London Trip
    tracker_name: Task
    status_name: To Do